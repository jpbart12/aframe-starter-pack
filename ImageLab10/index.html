<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img src="assets/sand.jpg" id="sand">
        <img src="assets/sky.png" id="sky">
        <img src="assets/pineapple.jpg" id="brasil">
        <img src="assets/rcok.jpg" id="rock">
        <img src="assets/squid.jpg" id="squid">
      </a-assets>
      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> -->
      <!-- <a-sphere src="#brasil" position="0 1.25 -5" rotation="-30 -80 0" radius="1.25" color=""></a-sphere> -->
      <a-cylinder src="#brasil" position="2 1 -5" rotation="0 -200 0" height="3" radius="1.25" color=""></a-cylinder>
      <a-sphere src="#rock" position="-2 0 -5" rotation="0 0 0" radius="1.25" color=""></a-sphere>
      <a-box src="#squid" position="0 1.5 -6" rotation="0 0 0" height="4" width="1.5" color=""></a-box>


      <!-- <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder> -->
      <!-- <a-plane src="#brasil" position="0 1 -4" rotation="-90 0 0" width="4" height="4" color="#"></a-plane> -->
      <a-plane src="#sand" position="0 0 -4" rotation="-90 0 0" width="6" height="4" color="#"></a-plane>
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
